      .replace(/modules\.([^.]+)\.items\.(\d+)\.([^.]+)/, (_, mod, idx, field) => `${moduleLabel(mod)} / 第 ${Number(idx) + 1} 条 / ${fieldLabel(field)}`);
  }

  function walkStrings(obj, path, visitor) {
    if (!obj || typeof obj !== 'object') return;
    Object.keys(obj).forEach(key => {
      const value = obj[key];
      const nextPath = path ? `${path}.${key}` : key;
      if (typeof value === 'string') visitor(value, nextPath, obj, key);
      else if (value && typeof value === 'object') walkStrings(value, nextPath, visitor);
    });
  }

  function analyzeText(value, path) {
    const text = plainText(value);
    if (!text) return [];
    const issues = [];
    const add = (type, message, sample) => issues.push({ type, message, sample: sample || text, path, label: pathLabel(path) });

    if (/ {2,}/.test(text)) add('多余空格', '存在连续多个半角空格。', text.match(/.{0,10} {2,}.{0,10}/)?.[0]);
    if (/[\u4e00-\u9fa5] +[\u4e00-\u9fa5]/.test(text)) add('中文空格', '中文字符之间存在多余空格。', text.match(/.{0,10}[\u4e00-\u9fa5] +[\u4e00-\u9fa5].{0,10}/)?.[0]);
    if (/[\u4e00-\u9fa5][,;:?!]/.test(text)) add('中文后半角标点', '中文后面出现半角标点，建议改为中文标点。', text.match(/.{0,10}[\u4e00-\u9fa5][,;:?!].{0,10}/)?.[0]);
    if (/[A-Za-z][，。；：！？][A-Za-z]/.test(text)) add('英文中全角标点', '英文单词之间出现中文标点，建议改为英文标点或空格。', text.match(/.{0,10}[A-Za-z][，。；：！？][A-Za-z].{0,10}/)?.[0]);
    if (/[。！？.!?]{2,}/.test(text)) add('重复标点', '存在连续重复句尾标点。', text.match(/.{0,10}[。！？.!?]{2,}.{0,10}/)?.[0]);
    if (/[\u4e00-\u9fa5]\.[\u4e00-\u9fa5]/.test(text)) add('中文句号异常', '中文句子中间出现英文句号，建议确认是否应为中文句号。', text.match(/.{0,10}[\u4e00-\u9fa5]\.[\u4e00-\u9fa5].{0,10}/)?.[0]);

    const looksSentence = text.length >= 18 && /[\u4e00-\u9fa5]/.test(text) && !/[。！？；;.!?]$/.test(text);
    const skipEnding = /[）)]$/.test(text) || /^[0-9.年月\-—至今\s]+$/.test(text) || /@|https?:|www\./i.test(text);
    if (looksSentence && !skipEnding) add('句尾标点', '较长中文句子缺少句尾标点。');

    return issues;
  }

  function collectProofreadIssues() {
    if (!window.editState || !editState.resume) return [];
    const issues = [];
    walkStrings(editState.resume.modules, 'modules', (value, path) => {
      if (path.endsWith('.photo')) return;
      issues.push(...analyzeText(value, path));
    });
    return issues;
  }

  function buildProofreadHtml(issues) {
    if (!issues.length) return '<div class="proof-empty">未发现明显的标点、空格或句尾问题。</div>';
    const counts = issues.reduce((acc, issue) => {
      acc[issue.type] = (acc[issue.type] || 0) + 1;
      return acc;
    }, {});
    const chips = Object.keys(counts).map(type => `<span class="proof-chip">${escHtml(type)}：${counts[type]}</span>`).join('');
    const rows = issues.slice(0, 80).map(issue => `
      <div class="proof-item">
        <div class="proof-item-title"><span>${escHtml(issue.label)}</span><span>${escHtml(issue.type)}</span></div>
        <div class="proof-item-body">${escHtml(issue.message)}</div>
        <div class="proof-item-body">片段：${escHtml(issue.sample || '')}</div>
      </div>`).join('');
    const omitted = issues.length > 80 ? `<div class="proof-item"><div class="proof-item-body">还有 ${issues.length - 80} 条未展开，请先处理当前高频问题。</div></div>` : '';
    return `<div class="proof-report"><div class="proof-summary">${chips}</div><div class="proof-list">${rows}${omitted}</div></div>`;
  }

  function fixPlainTextValue(value) {
    if (!value || /<[^>]+>/.test(value)) return value;
    let next = value;
    next = next.replace(/ {2,}/g, ' ');
    next = next.replace(/([\u4e00-\u9fa5]) +([\u4e00-\u9fa5])/g, '$1$2');
    next = next.replace(/([\u4e00-\u9fa5]),/g, '$1，');
    next = next.replace(/([\u4e00-\u9fa5]);/g, '$1；');
    next = next.replace(/([\u4e00-\u9fa5]):/g, '$1：');
    next = next.replace(/([\u4e00-\u9fa5])!/g, '$1！');
    next = next.replace(/([\u4e00-\u9fa5])\?/g, '$1？');
    next = next.replace(/([。！？.!?])\1+/g, '$1');
    return next;
  }

  function applyProofreadFixes() {
    let changed = 0;
    walkStrings(editState.resume.modules, 'modules', (value, path, owner, key) => {
      if (path.endsWith('.photo')) return;
      const next = fixPlainTextValue(value);
      if (next !== value) {
        owner[key] = next;
        changed++;
      }
    });
    return changed;
  }

  window.runProofreadCheck = function() {
    if (!editState || !editState.resume) {
      showToast('请先打开一份简历');
      return;
    }
    syncCurrentEditingState();
    const issues = collectProofreadIssues();
    showModal(`错别字 / 标点检查（${issues.length}）`, buildProofreadHtml(issues), [
      { label: '关闭' },
      { label: '保守修复', cls: 'btn-primary', callback: () => {
        const changed = applyProofreadFixes();
        renderEditorPanels();
        renderPreview();
        markDirty();
        showToast(`已保守修复 ${changed} 处`);
      }}
    ]);
  };

  function cleanTitle(value) {
    return plainText(value).replace(/[｜|]/g, ' | ');
  }

  function translateModuleTitle(modId, title) {
    const map = {
      basic_info: 'Personal Information',
      education: 'Education',
      internship: 'Internship Experience',
      project: 'Project Experience',
      campus: 'Campus Experience',
      skills: 'Skills & Certifications',
      custom: 'Additional Information'
    };
    return map[modId] || cleanTitle(title);
  }

  function translateBasicField(key, value) {
    const text = plainText(value);
    if (!text) return '';
    const dictionaries = {
      gender: { '女': 'Female', '男': 'Male' },
      political_status: { '预备党员': 'Probationary CPC Member', '中共党员': 'CPC Member', '共青团员': 'CYL Member', '群众': 'Non-affiliated' },
      intention: { '产品经理实习生': 'Product Manager Intern', '产品经理': 'Product Manager', '项目管理实习生': 'Project Management Intern', '商务分析实习生': 'Business Analyst Intern' },
      availability: { '随时到岗': 'Available immediately' }
    };
    if (dictionaries[key] && dictionaries[key][text]) return dictionaries[key][text];
    return text.replace(/年/g, '.').replace(/月/g, '').replace(/至今/g, 'Present');
  }

  function translateItemField(key, value) {
    let text = cleanTitle(value);
    if (!text) return '';
    text = text
      .replace(/硕士/g, 'Master')
      .replace(/本科/g, 'Bachelor')
      .replace(/研究生/g, 'Graduate Student')
      .replace(/产品经理实习生/g, 'Product Manager Intern')
      .replace(/项目管理实习生/g, 'Project Management Intern')
      .replace(/商务分析实习生/g, 'Business Analyst Intern')
      .replace(/图书情报/g, 'Library and Information Science')
      .replace(/信息管理与信息系统/g, 'Information Management and Information Systems')
      .replace(/至今/g, 'Present')
      .replace(/年/g, '.')
      .replace(/月/g, '');
    return text;
  }

  function translateBullet(value) {
    let text = plainText(value);
    if (!text) return '';
    text = text
      .replace(/^获奖荣誉[：:]/, 'Honors: ')
      .replace(/^研究方向[：:]/, 'Research Focus: ')
      .replace(/^核心课程[：:]/, 'Core Courses: ')
      .replace(/^技能[：:]/, 'Skills: ')
      .replace(/^语言[：:]/, 'Languages: ')
      .replace(/；/g, '; ')
      .replace(/，/g, ', ')
      .replace(/。/g, '. ')
      .replace(/：/g, ': ')
      .replace(/（/g, '(')
      .replace(/）/g, ')');
    return text.trim();
  }

  function buildEnglishResumeDraft(source) {
    const draft = deepCopy(source);
    draft.id = uuid();
    draft.name = `${source.name || '未命名简历'} English`;
    draft.created_at = new Date().toISOString();
    draft.updated_at = new Date().toISOString();
    draft.meta = draft.meta || {};
    draft.meta.note = 'English draft generated from Chinese resume structure. Review and polish before delivery.';
    draft.language = 'en';
    Object.keys(draft.modules || {}).forEach(modId => {
      const mod = draft.modules[modId];
      mod.title = translateModuleTitle(modId, mod.title);
      if (modId === 'basic_info' && mod.data) {
        Object.keys(mod.data).forEach(key => {
          if (key === 'photo') return;
          mod.data[key] = translateBasicField(key, mod.data[key]);
        });
      }
      if (modId === 'skills' && mod.data && mod.data.tags) mod.data.tags = translateBullet(mod.data.tags);

    return draft;

  // ============================================================
  // 个人信息静态标签选中文字后上色
  // 说明：

  // ============================================================
  function v6SelectionInsideBasicInfo() {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;

    const range = sel.getRangeAt(0);
    const canvas = document.getElementById('a4-preview');

    if (!canvas || !canvas.contains(range.commonAncestorContainer)) return null;

    let node = range.commonAncestorContainer;
    if (node.nodeType !== 1) node = node.parentNode;

    const basicRoot = v6FindBasicInfoRoot(canvas);
    if (!basicRoot || !basicRoot.contains(node)) return null;

    const editable = node.closest && node.closest('[data-editable]');
    if (editable) return null;

    const label = node.closest && node.closest(
      '.static-label, .contact-label, .info-label, .contact-item'
    );

    return label || null;
  }

  function v6StoreStaticBasicInfoColor(el, color) {
    const mod = v6GetModule('basic_info');
    if (!mod) return;

    if (!mod.data) mod.data = {};
    if (!mod.data._staticTextColors) mod.data._staticTextColors = {};

    const key = (el.textContent || '').trim().replace(/\s+/g, ' ');
    if (!key) return;

    if (color) {
      mod.data._staticTextColors[key] = color;
    } else {
      delete mod.data._staticTextColors[key];
    }
  }

  function v6ApplyStaticBasicInfoColors(root) {
    const mod = v6GetModule('basic_info');
    if (!mod || !mod.data || !mod.data._staticTextColors) return;

    const basicRoot = v6FindBasicInfoRoot(root);
    if (!basicRoot) return;

    const map = mod.data._staticTextColors || {};

    const targets = basicRoot.querySelectorAll(
      '.static-label, .contact-label, .info-label, .contact-item'
    );

    targets.forEach(el => {
      const key = (el.textContent || '').trim().replace(/\s+/g, ' ');
      if (key && map[key]) {
        el.style.color = map[key];
      }
    });
  }

  // 包装 v5 的选中文字改颜色函数
  if (typeof applySelectedTextColor === 'function' && !applySelectedTextColor.__v6Wrapped) {
    const oldApplySelectedTextColor = applySelectedTextColor;

    window.applySelectedTextColor = function v6ApplySelectedTextColor(color) {
      const staticLabel = v6SelectionInsideBasicInfo();

      if (staticLabel) {
        staticLabel.style.color = color;
        v6StoreStaticBasicInfoColor(staticLabel, color);
        v6MarkDirtyAndRefresh({ renderEditor: false, renderPreview: false });
        v6Toast('已设置个人信息标签颜色');
        return;
      }

      return oldApplySelectedTextColor(color);
    };

    window.applySelectedTextColor.__v6Wrapped = true;
  }

  if (typeof clearSelectedTextColor === 'function' && !clearSelectedTextColor.__v6Wrapped) {
    const oldClearSelectedTextColor = clearSelectedTextColor;

    window.clearSelectedTextColor = function v6ClearSelectedTextColor() {
      const staticLabel = v6SelectionInsideBasicInfo();

      if (staticLabel) {
        staticLabel.style.color = '';
        v6StoreStaticBasicInfoColor(staticLabel, '');
        v6MarkDirtyAndRefresh({ renderEditor: false, renderPreview: false });
        v6Toast('已恢复个人信息标签默认颜色');
        return;

      return oldClearSelectedTextColor();

    window.clearSelectedTextColor.__v6Wrapped = true;
  }

  // ============================================================
  // 模块分割线颜色

  window.v6SetModuleDividerColor = function v6SetModuleDividerColor(modId, color) {
    const mod = v6GetModule(modId);

    if (!mod) {
      v6Toast('没有找到模块：' + modId);

    v6Toast(color ? '已设置模块分割线颜色' : '已恢复模块分割线默认颜色');
  };

  function v6FindSectionTitle(root, modId) {
    if (!root || !modId) return null;

    return root.querySelector(`[data-editable="${modId}._title"]`) ||
           root.querySelector(`[data-editable='${modId}._title']`);
  }

  function v6ApplyModuleDividerColors(root) {
    const modules = v6GetModules();

    Object.keys(modules || {}).forEach(modId => {
      const mod = modules[modId];
      if (!mod) return;

      const color = mod.dividerColor || '';
      const titleEl = v6FindSectionTitle(root, modId);

      if (!titleEl) return;

      const section = titleEl.closest(
        '.resume-section, .section, .module-section, .exp-section, .resume-block'
      ) || titleEl.parentElement;

      const targets = [];

      targets.push(titleEl);

        section.querySelectorAll(
          '.section-title, .module-title, .resume-section-title, hr, .divider, .section-divider'
        ).forEach(el => targets.push(el));
      }

      targets.forEach(el => {
        if (!el || !el.style) return;

        if (color) {
          el.style.borderColor = color;
          el.style.borderBottomColor = color;
          el.style.borderTopColor = color;

          if (el.tagName === 'HR') {
            el.style.backgroundColor = color;
            el.style.color = color;
          }
        } else {
          el.style.borderColor = '';
          el.style.borderBottomColor = '';
          el.style.borderTopColor = '';

          if (el.tagName === 'HR') {
            el.style.backgroundColor = '';
            el.style.color = '';
          }
        }
      });
    });

  // ============================================================
  // 模块条目排序
  // ============================================================
  window.v6MoveModuleItem = function v6MoveModuleItem(modId, index, delta) {
    const mod = v6GetModule(modId);

    if (!mod || !Array.isArray(mod.items)) {
      v6Toast('该模块没有可排序的条目');
      return;
    }

    const from = Number(index);
    const to = from + Number(delta);

    if (Number.isNaN(from) || Number.isNaN(to)) return;
    if (from < 0 || from >= mod.items.length) return;
    if (to < 0 || to >= mod.items.length) return;

    const temp = mod.items[from];
    mod.items[from] = mod.items[to];
    mod.items[to] = temp;

    v6MarkDirtyAndRefresh();
    v6Toast('已调整条目顺序');
  };

  function v6GetItemLabel(modId, item, index) {
    if (!item) return `第 ${index + 1} 项`;

    const raw =
      item.school ||
      item.company ||
      item.project_name ||
      item.title ||
      item.name ||
      item.organization ||
      item.org ||
      item.role ||
      item.major ||
      item.subtitle ||
      '';

    const text = v6Plain(raw).trim();

    if (text) return text;

    if (item.bullets && item.bullets[0]) {
      const b = v6Plain(item.bullets[0]).trim();
      if (b) return b.slice(0, 18);
    }

    return `第 ${index + 1} 项`;
  }

  function v6SortBoxHTML(modId, mod) {
    if (!mod || !Array.isArray(mod.items) || mod.items.length <= 1) return '';

    const rows = mod.items.map((item, idx) => {
      const label = v6GetItemLabel(modId, item, idx);
      const safeLabel = label
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

      return `
        <div class="v6-sort-item">
          <span class="v6-sort-name" title="${safeLabel}">${idx + 1}. ${safeLabel}</span>
          <button type="button" class="v6-sort-btn" ${idx === 0 ? 'disabled' : ''} onclick="v6MoveModuleItem('${modId}', ${idx}, -1)">↑</button>
          <button type="button" class="v6-sort-btn" ${idx === mod.items.length - 1 ? 'disabled' : ''} onclick="v6MoveModuleItem('${modId}', ${idx}, 1)">↓</button>
        </div>
      `;
    }).join('');

    return `
      <div class="v6-enhance-box" data-v6-box="sort-${modId}">
        <div class="v6-enhance-title">
          <span>条目排序</span>
          <span style="font-weight:400;color:#6B7280;">上移 / 下移</span>
        </div>
        <div class="v6-sort-list">${rows}</div>
      </div>
    `;
  }

  function v6DividerColorBoxHTML(modId) {
    return `
      <div class="v6-enhance-box" data-v6-box="divider-${modId}">
        <div class="v6-enhance-title">
          <span>模块分割线颜色</span>
        </div>
        ${v6ColorButtonHTML('v6SetModuleDividerColor', modId)}
      </div>
    `;
  }

  function v6BasicInfoColorBoxHTML() {
    return `
      <div class="v6-enhance-box" data-v6-box="basic-color">
        <div class="v6-enhance-title">
          <span>个人信息整体文字颜色</span>
        </div>
        ${v6ColorButtonHTML('v6SetBasicInfoColor', 'basic_info')}
      </div>
    `;
  }

  function v6EnhanceEditorPanels() {
    const modules = v6GetModules();
    const left = v6FindLeftContainer();

    if (!left || !modules) return;

    // 清理旧增强 UI，避免重复
    left.querySelectorAll('.v6-enhance-box').forEach(el => el.remove());

    Object.keys(modules).forEach(modId => {
      const mod = modules[modId];
      const panel = v6FindModulePanel(modId);

      if (!panel) return;

      const insertTarget = panel.querySelector('.module-body, .panel-body, .card-body, .form-body') || panel;

      const holder = document.createElement('div');

      let html = '';

      if (modId === 'basic_info') {
        html += v6BasicInfoColorBoxHTML();
      }

      // 每个模块都允许设置分割线颜色
      html += v6DividerColorBoxHTML(modId);

      // 有 items 的模块支持条目排序
      html += v6SortBoxHTML(modId, mod);

      holder.innerHTML = html;

      if (insertTarget.firstChild) {
        insertTarget.insertBefore(holder, insertTarget.firstChild);
      } else {
        insertTarget.appendChild(holder);
      }
    });
  }

  // ============================================================
  // Preview after-render enhancement
  // ============================================================
  function v6ApplyPreviewEnhancements() {
    const canvas = document.getElementById('a4-preview');

    if (!canvas) return;

    v6ApplyBasicInfoColor(canvas);
    v6ApplyStaticBasicInfoColors(canvas);
    v6ApplyModuleDividerColors(canvas);
  }

  // 包装 renderPreview
  if (typeof renderPreview === 'function' && !renderPreview.__v6Wrapped) {
    const oldRenderPreview = renderPreview;

    renderPreview = function v6RenderPreviewWrapper() {
      const result = oldRenderPreview.apply(this, arguments);
      v6ApplyPreviewEnhancements();
      return result;
    };

    renderPreview.__v6Wrapped = true;
  }

  // 包装 renderEditorPanels
  if (typeof renderEditorPanels === 'function' && !renderEditorPanels.__v6Wrapped) {
    const oldRenderEditorPanels = renderEditorPanels;

    renderEditorPanels = function v6RenderEditorPanelsWrapper() {
      const result = oldRenderEditorPanels.apply(this, arguments);

      setTimeout(() => {
        try {
          v6EnhanceEditorPanels();
        } catch (err) {
          console.error('v6EnhanceEditorPanels failed:', err);

      }, 0);

      return result;
    };

    renderEditorPanels.__v6Wrapped = true;
  }

  // 包装 applyFormatting，避免全局格式刷新后覆盖颜色
  if (typeof applyFormatting === 'function' && !applyFormatting.__v6Wrapped) {
    const oldApplyFormatting = applyFormatting;

      v6ApplyPreviewEnhancements();
      return result;
    };

    applyFormatting.__v6Wrapped = true;
  }

  // 初始执行一次
  setTimeout(() => {
    try {
      v6EnhanceEditorPanels();
      v6ApplyPreviewEnhancements();
    } catch (err) {
      console.error('v6 init enhancement failed:', err);
    }
  }, 100);
})();





// ============================================================
// 本地物理硬盘直读直写引擎 (Local Disk Bridge)
// ============================================================
(function initLocalDiskBridge() {
    function normalizeStore(data) {
        data = data && typeof data === 'object' ? data : {};
        const resumes = Array.isArray(data.resumes) ? data.resumes : [];
        resumes.forEach(resume => {
            if (resume && resume.modules) {
                delete resume.modules.campus;
                delete resume.modules.skills;
            }
        });
        return {
            resumes: resumes,
            deliveryRecords: Array.isArray(data.deliveryRecords) ? data.deliveryRecords : [],
            settings: data.settings && typeof data.settings === 'object' ? data.settings : {}
        };
    }

    function cloneStore(data) {
        return JSON.parse(JSON.stringify(normalizeStore(data)));
    }

    window.__resumeStoreCache = normalizeStore(window.__resumeStoreCache);

    // 1. 同步读取本地物理文件，并用内存缓存保证保存后的 UI 立即同步
    window.loadStore = function() {
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/store?t=' + Date.now(), false);
            xhr.send(null);
            if (xhr.status === 200) {
                window.__resumeStoreCache = normalizeStore(JSON.parse(xhr.responseText));
                return cloneStore(window.__resumeStoreCache);
            }
        } catch(e) {
            console.warn('读取物理文件异常，使用内存缓存', e);
        }
        return cloneStore(window.__resumeStoreCache);
    };

    // 2. 覆盖原生保存逻辑，数据直接流向 Node 本地服务
    window.saveStore = function(store) {
        const normalized = normalizeStore(store);
        window.__resumeStoreCache = cloneStore(normalized);
        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/store', false);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.send(JSON.stringify(normalized));
            if (xhr.status >= 200 && xhr.status < 300) {
                const payload = JSON.parse(xhr.responseText || '{}');
                if (payload && payload.store) {
                    window.__resumeStoreCache = normalizeStore(payload.store);
                    if (window.editState && window.editState.resume) {
                        const persisted = window.__resumeStoreCache.resumes.find(r => r.id === window.editState.resume.id);
                        if (persisted) window.editState.resume = persisted;
                    }
                }
            } else {
                console.warn('物理写入请求失败: HTTP ' + xhr.status);
            }
        } catch(e) {
            console.warn('物理写入请求失败', e);
        }
    };

    // 3. UI 注入：在顶部导航栏挂载物理导入/导出按钮
    document.addEventListener('DOMContentLoaded', () => {
        const navLeft = document.querySelector('.nav-left');
        if (navLeft && !document.getElementById('local-import-file')) {
            const btnHtml = `
                <button class="btn-outline btn-sm" onclick="document.getElementById('local-import-file').click()" style="margin-left:24px; border-color:var(--border);">📂 导入 JSON</button>
                <button class="btn-outline btn-sm" onclick="exportLocalDiskJSON()" style="margin-left:8px; border-color:var(--border);">💾 导出备份</button>
                <input type="file" id="local-import-file" accept=".json" style="display:none" onchange="handleLocalImport(event)">
            `;
            navLeft.insertAdjacentHTML('beforeend', btnHtml);
        }
    });

    // 4. 导出物理备份
    window.exportLocalDiskJSON = function() {
        const data = window.loadStore();
        const blob = new Blob([JSON.stringify({source: 'local_disk_export', ...data}, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'resume_local_backup_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(url);
        if(typeof showToast === 'function') showToast('已导出物理备份文件');
    };

    // 5. 导入 JSON 并与当前物理文件归并
    window.handleLocalImport = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                let importedResumes = [];
                if (Array.isArray(imported)) importedResumes = imported;
                else if (imported.resumes) importedResumes = imported.resumes;
                else if (imported.data && imported.data.resumes) importedResumes = imported.data.resumes;
                else if (imported.resume) importedResumes = [imported.resume];
                
                if (importedResumes.length === 0) {
                    alert('导入失败：未在文件中检索到简历实体。');
                    return;
                }
                
                const currentStore = window.loadStore();
                const currentResumes = currentStore.resumes || [];
                const existingIds = new Set(currentResumes.map(r => r.id));
                
                let addCount = 0;
                importedResumes.forEach(r => {
                    if (!existingIds.has(r.id)) {
                        currentResumes.push(r);
                        addCount++;
                    } else {
                        // 覆盖模式：同一份简历以新导入的为准
                        const idx = currentResumes.findIndex(cr => cr.id === r.id);
                        if (idx !== -1) currentResumes[idx] = r;
                        addCount++;
                    }
                });
                
                window.saveStore({
                    resumes: currentResumes,
                    deliveryRecords: currentStore.deliveryRecords || [],
                    settings: currentStore.settings || {}
                });
                alert(`事务完成：成功将 ${addCount} 份历史数据合并至物理层。点击确定刷新视图。`);
                location.reload();
            } catch(err) {
                alert('执行中断：JSON 解析失败。');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    };

    setTimeout(() => {
        try {
            const hash = window.location.hash.replace('#', '');
            if (hash.startsWith('editor/') && typeof navigate === 'function') {
                navigate('editor', hash.replace('editor/', ''));
            } else if (hash === 'delivery' && typeof renderDeliveryView === 'function') {
                currentRoute = 'delivery';
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                const deliveryView = document.getElementById('view-delivery');
                if (deliveryView) deliveryView.classList.add('active');
                renderDeliveryView();
            } else if (hash === 'templates' && typeof navigate === 'function') {
                navigate('templates');
            } else if (typeof renderHomePage === 'function') {
                currentRoute = 'home';
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                const homeView = document.getElementById('view-home');
                if (homeView) homeView.classList.add('active');
                renderHomePage();
            }
        } catch(e) {
            console.warn('物理存储视图刷新失败', e);
        }
    }, 0);
})();
</script>

<script>
(function enforceDataPointers() {
    // 1. 修复底层查找链路，阻断首页 PDF 空白渲染
    window.getAllResumes = function() {
        return (window.loadStore().resumes || []).sort((a,b) => new Date(b.updated_at || 0) - new Date(a.updated_at || 0));
    };
    window.getResume = function(id) {
        const resumes = window.loadStore().resumes || [];
        return resumes.find(r => r.id === id) || null;
    };
    window.getResumeById = function(id) { 
        const resumes = window.loadStore().resumes || [];
        return resumes.find(r => r.id === id) || null; 
    };
    
    // 2. 增强保存与删除闭环
    window.saveResume = function(resume) {
        const store = window.loadStore();
        const idx = store.resumes.findIndex(r => r.id === resume.id);
        resume.updated_at = new Date().toISOString();
        if(idx !== -1) store.resumes[idx] = resume;
        else store.resumes.push(resume);
        window.saveStore(store);
        return resume;
    };
    window.deleteResume = function(id) {
        const store = window.loadStore();
        store.resumes = store.resumes.filter(r => r.id !== id);
        store.deliveryRecords = (store.deliveryRecords || []).filter(r => r.resumeId !== id);
        window.saveStore(store);
    };

    // 3. 重构 Markdown 算子，引入空指针防御机制
    window.exportMarkdown = function(id) {
        let r = null;
        if (typeof id === 'string') {
            r = window.getResumeById(id);
        } else if (window.editState && editState.resume) {
            r = editState.resume;
        }
        
        if (!r) { 
            alert('执行中断：未捕获有效简历实体数据。'); 
            return; 
        }
        
        let md = `# ${r.name || '未命名简历'}\n\n`;
        const contacts = [];
        if(r.contact) {
            if(r.contact.phone) contacts.push(r.contact.phone);
            if(r.contact.email) contacts.push(r.contact.email);
            if(r.contact.github) contacts.push(r.contact.github);
            if(r.contact.website) contacts.push(r.contact.website);
        }
        if(contacts.length > 0) md += contacts.join(' | ') + '\n\n';

        if(r.sections && Array.isArray(r.sections)) {
            r.sections.forEach(sec => {
                md += `## ${sec.title || '模块'}\n\n`;
                if(sec.items && Array.isArray(sec.items)) {
                    sec.items.forEach(item => {
                        md += `### ${item.title || '项目'}\n`;
                        const subs = [];
                        if(item.subtitle) subs.push(item.subtitle);
                        if(item.date) subs.push(item.date);
                        if(subs.length > 0) md += `*${subs.join(' · ')}*\n\n`;
                        if(item.desc) {
                            let text = item.desc.replace(/<br\s*[\/]?>/gi, '\n');
                            text = text.replace(/<[^>]+>/g, '');
                            md += text + '\n\n';
                        }
                    });
                }
            });
        }
        
        const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${r.name || 'resume'}.md`;
        a.click();
        URL.revokeObjectURL(url);
        if(typeof showToast === 'function') showToast('功能匹配成功：纯文本实体已释出');
    };
})();
</script>

                .sort((a,b) => a.order - b.order);
                
            orderedModules.forEach(mod => {
                const title = (mod.title || '').replace(/<[^>]+>/g, '');
                md += '## ' + title + '\n\n';
                
                if (mod.id === 'skills') {
                    if (mod.data && mod.data.tags) {
                        md += mod.data.tags.replace(/<[^>]+>/g, '') + '\n\n';
                    }
                } else if (mod.items && Array.isArray(mod.items)) {
                    mod.items.forEach(item => {
                        const itemTitle = (item.title || item.school || item.company || item.project_name || '').replace(/<[^>]+>/g, '');
                        const itemRole = (item.role || item.subtitle || item.major || '').replace(/<[^>]+>/g, '');
                        const itemTime = (item.time || '').replace(/<[^>]+>/g, '');
                        
                        md += '### ' + itemTitle + '\n';
                        const subs = [];
                        if(itemRole) subs.push(itemRole);
                        if(itemTime) subs.push(itemTime);
                        if(subs.length > 0) md += '*' + subs.join(' · ') + '*\n\n';
                        
                        const bullets = item.bullets || item.details || [];
                        bullets.forEach(b => {
                            let text = b.replace(/<br\s*[\/]?>/gi, '\n');
                            text = text.replace(/<[^>]+>/g, '');
                            if (text.trim()) md += '- ' + text.trim() + '\n';
                        });
                        md += '\n';
                    });
                }
            });
        }
        
        const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (r.name || 'resume') + '.md';
        a.click();
        URL.revokeObjectURL(url);
        if(typeof showToast === 'function') showToast('功能匹配成功：纯文本实体已释出');
    };

    // 2. 修复首页 PDF 渲染空白：解除离屏截断限制
    window.quickExport = function(id) {
        let r = null;
        const store = window.loadStore();
        if (store && store.resumes) {
            r = store.resumes.find(res => res.id === id);
        }
        if (!r) {
            alert('未找到该简历数据');
            return;
        }
        const t = window.getTemplate ? window.getTemplate(r.template_id) : { cssClass: '' };
        const html = window.renderResumeHTML ? window.renderResumeHTML(t, r.modules, r.meta) : '';
        
        const tempDiv = document.createElement('div');
        tempDiv.className = 'a4-canvas ' + t.cssClass;
        // 关键修正：摒弃 left:-9999px，改用 z-index:-9999 保持在渲染捕捉区内，同时避免视觉干扰
        tempDiv.style.cssText = 'width:794px;min-height:1123px;padding:48px 52px;background:#fff;box-sizing:border-box;position:absolute;left:0;top:0;z-index:-9999;';
        tempDiv.innerHTML = html;

        if (typeof window.decodeEscapedRichTextInPreview === 'function') window.decodeEscapedRichTextInPreview(tempDiv);
        if (r.formatting && typeof window.applyFormattingToElements === 'function') window.applyFormattingToElements(tempDiv, r.formatting);

        document.body.appendChild(tempDiv);
        const name = r.name || '简历';
        const opt = {
            margin: 0,

<script>
(function enforcePDFScaleAndOffset() {

        return {
            margin: 0,
            filename: (name || '简历') + '.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: {
                scale: 2,
                useCORS: true,

                scrollY: 0    // 物理阻断窗口纵向滑动视差系数

<script>
(function initHistoryStack() {
    window.historyStack = [];
    window.historyIndex = -1;
    window.isHistoryNavigating = false;

    window.recordHistory = function() {
        if (window.isHistoryNavigating || (typeof editState === 'undefined' || !editState) || !editState.resume) return;
        const currentState = JSON.stringify(editState.resume);
        if (window.historyIndex >= 0 && window.historyStack[window.historyIndex] === currentState) return;

        if (window.historyIndex < window.historyStack.length - 1) {
            window.historyStack = window.historyStack.slice(0, window.historyIndex + 1);
        }

        window.historyStack.push(currentState);
        if (window.historyStack.length > 50) {
            window.historyStack.shift();
        } else {
            window.historyIndex++;
        }
        updateHistoryUI();
    };

    window.undo = function() {
        if (window.historyIndex > 0) {
            window.isHistoryNavigating = true;
            window.historyIndex--;
            restoreHistoryState(window.historyStack[window.historyIndex]);
            window.isHistoryNavigating = false;
        }
    };

    window.redo = function() {
        if (window.historyIndex < window.historyStack.length - 1) {
            window.isHistoryNavigating = true;
            window.historyIndex++;
            restoreHistoryState(window.historyStack[window.historyIndex]);
            window.isHistoryNavigating = false;
        }
    };

    function restoreHistoryState(stateString) {
        try {
            editState.resume = JSON.parse(stateString);
            if (typeof window.renderEditorPanels === 'function') window.renderEditorPanels();
            if (typeof window.renderPreview === 'function') window.renderPreview();
            updateHistoryUI();
            if (typeof window.showToast === 'function') window.showToast('状态回滚完成');
            
            // 物理落盘，绕过新历史记录生成
            if (typeof window.saveStore === 'function') {
                const store = window.loadStore();
                const idx = store.resumes.findIndex(r => r.id === editState.resume.id);
                if (idx !== -1) store.resumes[idx] = editState.resume;
                window.saveStore(store);
            }
        } catch (e) {
            console.error('状态回滚异常:', e);
        }
    }

    function updateHistoryUI() {
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        if (btnUndo) {
            btnUndo.disabled = window.historyIndex <= 0;
            btnUndo.style.opacity = btnUndo.disabled ? '0.5' : '1';
            btnUndo.style.cursor = btnUndo.disabled ? 'not-allowed' : 'pointer';
        }
        if (btnRedo) {
            btnRedo.disabled = window.historyIndex >= window.historyStack.length - 1;
            btnRedo.style.opacity = btnRedo.disabled ? '0.5' : '1';
            btnRedo.style.cursor = btnRedo.disabled ? 'not-allowed' : 'pointer';
        }
    }

    // 拦截 markDirty 算子，挂载防抖机制（500ms）
    const _originalMarkDirty = window.markDirty;
    window.markDirty = function() {
        if (!window.isHistoryNavigating) {
            clearTimeout(window._historyDebounce);
            window._historyDebounce = setTimeout(window.recordHistory, 500);
        }
        if (typeof _originalMarkDirty === 'function') return _originalMarkDirty.apply(this, arguments);
    };

    // 拦截 loadEditor 算子，初始化当前简历快照
    const _originalLoadEditor = window.loadEditor;
    window.loadEditor = function(id) {
        const res = typeof _originalLoadEditor === 'function' ? _originalLoadEditor.apply(this, arguments) : undefined;
        window.historyStack = [];
        window.historyIndex = -1;
        window.isHistoryNavigating = false;
        setTimeout(window.recordHistory, 200);
        return res;
    };

    // 绑定物理键盘事件侦听
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            if (e.shiftKey) {
                e.preventDefault();
                window.redo();
            } else {
                e.preventDefault();
                window.undo();
            }
        }
    });
})();
</script>

})();

<script>
(function initV11DataManagement() {
    // 物理存储容量计算器与探针
    window.checkStorageStatus = function() {
        try {
            const data = window.loadStore();
            const jsonStr = JSON.stringify(data);
            const bytes = new Blob([jsonStr]).size;
            const kb = (bytes / 1024).toFixed(2);
            const count = data.resumes ? data.resumes.length : 0;
            alert(`当前物理存储区状态：\n实体数量：${count} 份\n空间占用：${kb} KB\n\n约束建议：定期使用顶部导航的 [导出备份] 功能将全量数据归档。`);
        } catch(e) {
            alert('执行中断：存储状态寻址失败。');
        }
    };

    // 单项实体定向导出机制
    window.exportSingleEntity = function(id) {
        const r = window.getResumeById(id);
        if (!r) {
            alert('执行中断：未捕获有效实体');
            return;
        }
        const payload = JSON.stringify({source: 'single_export', resume: r}, null, 2);
        const blob = new Blob([payload], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `resume_entity_${r.name}.json`;
        a.click();
        URL.revokeObjectURL(url);
        if(typeof showToast === 'function') showToast(`功能匹配成功：实体 [${r.name}] 已物理释出`);
    };

    // 拦截首页渲染器，注入单项导出按钮
    const _originalRenderHomePage = window.renderHomePage;
    window.renderHomePage = function() {
        if (typeof _originalRenderHomePage === 'function') _originalRenderHomePage.apply(this, arguments);

        document.querySelectorAll('.resume-card-actions').forEach(panel => {

<script>
// 检查投递记录功能的调试脚本
function debugDeliveryRecords() {
  try {
    const store = loadStore();
    console.log('完整存储数据:', store);
    console.log('投递记录数量:', store.deliveryRecords ? store.deliveryRecords.length : 0);
    console.log('投递记录详情:', store.deliveryRecords || []);
  } catch (e) {
    console.error('读取存储数据出错:', e);
  }
}

// 优化照片存储 - 只在必要时存储照片
function optimizeResumeStorage(resume) {
  // 如果照片太大，可以考虑压缩
  if (resume.modules && resume.modules.basic_info && resume.modules.basic_info.data && resume.modules.basic_info.data.photo) {
    const photo = resume.modules.basic_info.data.photo;
    // 如果照片大小超过一定阈值（如100KB），可以考虑压缩
    const base64Length = photo.length;
    const approxFileSizeKB = Math.round((base64Length * 0.75) / 1024);
    
    if (approxFileSizeKB > 100) { // 如果超过100KB
      console.warn(`照片文件较大 (${approxFileSizeKB}KB)，考虑压缩以节省存储空间`);
    }
  }
  return resume;
}

// 改进的保存简历函数
function saveResumeOptimized(resume) {
  const optimizedResume = optimizeResumeStorage(resume);
  const store = loadStore();
  const idx = store.resumes.findIndex(r => r.id === resume.id);
  resume.updated_at = new Date().toISOString();
  if (idx >= 0) {
    store.resumes[idx] = optimizedResume;
  } else {
    store.resumes.push(optimizedResume);
  }
  saveStore(store);
  return resume;
}
</script>
